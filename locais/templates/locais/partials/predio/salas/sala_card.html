<div class="card-sala {{ classe_estado }}">

      <p><i class="fa-solid fa-desktop"></i> Computadores: {{ quantidade_computador }}</p>
      <p><i class="fa-solid fa-gear"></i> Ar-condicionados: {{ quantidade_ar_condicionado }}</p>
</div>
