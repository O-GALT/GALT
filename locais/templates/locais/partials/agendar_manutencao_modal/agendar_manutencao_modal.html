{% load static %}

<div id="{{ modal_id }}" class="modal-overlay none">
    <div class="manutencao-modal-box">

        <button class="modal-close" {% if onclick %} onclick="{{ onclick }}" {% endif %}>
            <i class="fa-solid fa-xmark"></i>
        </button>

        <h2 class="manutencao-title">Agendar manutenção</h2>

        <p class="manutencao-subtitle">
            Para agendar a manutenção em uma sala é preciso preencher o formulário abaixo :
        </p>

        <form class="manutencao-form" id="manutencaoForm">

            <!-- Sala -->
            <div class="form-group">
                <label>Sala que passará por manutenções <span>*</span></label>
                <div class="select-box">
                    <select name="room">
                        <option>Sala A17</option>
                        <option>Sala B02</option>
                        <option>Sala C15</option>
                    </select>
                </div>
            </div>

            <!-- Técnicos -->
            <div class="form-group">
                <label>Técnicos responsáveis <span>*</span></label>

                <div class="select-box">
                    <select id="technicianSelect">
                        <option value="">Selecione um técnico</option>
                        <option value="eu">@Eu</option>
                        <option value="maria">@Maria</option>
                        <option value="carlos">@Carlos</option>
                    </select>
                </div>

                <div id="techniciansList" class="technicians-list"></div>

                <!-- Hidden input para envio ao Django -->
                <input type="hidden" name="technicians" id="techniciansInput">
            </div>

            <!-- Datas -->
            <div class="form-group">
                <label>Data da manutenção <span>*</span></label>
                    <input type="date" name="date"/>
            </div>

            <div class="form-group">
                <label>Horário de inícío da manutenção <span>*</span></label>
                    <input type="time" name="start_hour"/>
            </div>

            <div class="form-group">
                <label>Horário de término da manutenção <span>*</span></label>
                    <input type="time" name="end_hour"/>
            </div>

            <!-- Descrição -->
            <div class="form-group">
                <label>Descrição <span>*</span></label>
                <textarea
                        name="description"
                        placeholder="Descreva um breve motivo pelo qual você estará realizando essa manutenção.">
                </textarea>
            </div>

            <!-- Ações -->
            <div class="form-actions">
                <button type="button" class="cancel-btn" {% if onclick %} onclick="{{ onclick }}" {% endif %}>
                    Cancelar
                </button>
                <button type="submit" class="confirm-btn">
                    Confirmar
                </button>
            </div>

        </form>
    </div>
</div>


<script>
    const technicianSelect = document.getElementById('technicianSelect');
    const techniciansList = document.getElementById('techniciansList');
    const techniciansInput = document.getElementById('techniciansInput');
    const form = document.getElementById('manutencaoForm');


    const selectedTechnicians = [];


    technicianSelect.addEventListener('change', () => {
        const value = technicianSelect.value;
        const text = technicianSelect.options[technicianSelect.selectedIndex].text;

        if (!value) return;

        const exists = selectedTechnicians.some(t => t.value === value);
        if (exists) {
            technicianSelect.value = '';
            return;
        }

        selectedTechnicians.push({ value, text });
        technicianSelect.value = '';

        renderTechnicians();
    });



    function renderTechnicians() {
        techniciansList.innerHTML = '';

        selectedTechnicians.forEach((tech, index) => {
            const item = document.createElement('div');
            item.className = 'technician-item';

            item.innerHTML = `
            <span>${tech.text}</span>
            <button type="button" onclick="removeTechnician(${index})">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;

            techniciansList.appendChild(item);
        });
    }


    function removeTechnician(index) {
        selectedTechnicians.splice(index, 1);
        renderTechnicians();
    }


    form.addEventListener('submit', () => {
        techniciansInput.value = JSON.stringify(
            selectedTechnicians.map(t => t.value)
        );
    });
</script>
