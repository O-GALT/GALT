{% extends 'core/paginas/base/estrutura_base/estrutura_base.html' %}

{% block header %}
{% include 'contas/partials/headers/informacoes_pessoais_header.html' %}
{% endblock %}

{% load static %}

{% block content %}

<link rel="stylesheet"
    href="{% static 'contas/css/partials/components_centrais/informacoes_pessoais/informacoes_pessoais.css' %}">

<main class="container">

    <section class="profile-card">
        <div class="profile-header">
            <div class="profile-info">

                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSe9hj1SVBykNeadEEmA6T8U7OQKQvmVmbUtQ&s"
                    alt="Foto de perfil" class="profile-img" />

                <div class="profile-name">
                    <h2>{{ usuario.nome }}</h2>
                    <span>{{ usuario.email_escolar }}</span>
                </div>
            </div>

            <div class="actions">
                <button class="edit-btn" title="Editar informações">Edit</button>
                <button class="exclude-btn" title="Excluir conta">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>

        </div>

        <form class="info-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" value="Alexa Rawles" readonly />
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" value="alexarawles@gmail.com" readonly />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefone">Número de contato</label>
                    <input type="text" id="telefone" value="+55 84 98608 - 4193" readonly />
                </div>

                <div class="form-group">
                    <label for="email-escolar">Email escolar</label>
                    <input type="email" id="email-escolar" value="alexarawles@dominio.educ.com" readonly />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cargo">Cargo/Função</label>
                    <select name="Cargo" id="cargp">
                        <option value="admin">Administrador</option>
                        <option value="ajudante">Servidor</option>
                        <option value="tecnico">Técnico de TI</option>
                        <option value="tecnico">Aluno</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" value="000.000.000-00" readonly />
                </div>
            </div>
        </form>
    </section>

</main>
{% endblock %}
