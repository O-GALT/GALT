{% extends "core/pages/base/modal/modal_base.html" %}

{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de Setor</title>
    <link rel="stylesheet" href="{% static 'core/css/modal-criar-equipamento.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            {% block modal_content %}
            <div class="modal-header">
                <div class="header-left">
                    <img src="{% static 'core/icons/header_icon.png' %}" alt="Estado Liberada">
                    <div>
                        <h2>Adicionar setor</h2>
                        <p>Monitore equipamentos, estado e histórico de manutenções de cada ambiente.</p>
                    </div>
                </div>
            </div>

            <hr>

            <form class="modal-form" action="{% url 'criar_setor_modal' %}" method="post">
                {% csrf_token %}

                <div class="form-row">
                    <label>Setor </label>
                    {{ form.setor }}
                </div>

                <!--  
                div class="dropdown form-row" id="dropdown">
                    <div class="dropdown-header">

                        <label for="setores">Predios</label>

                        <div class="dropdown-wrapper">
                            <div class="dropdown-btn" onclick="toggleDropdown()">Selecione os setores do prédio</div>

                            <div class="dropdown-content">
                                {% for predio in predios %}
                                <label><input type="checkbox" value="{{ predio }}"> {{ predio }}</label>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
                -->

                <hr>

                <div class="modal-actions">
                    <a href="{% url 'criar_recursos' %}"><button type="button" class="btn-cancel">Cancelar</button></a>
                    <button type="submit" class="btn-create">Criar</button>
                </div>

            </form>
            {% endblock %}
        </div>
    </div>

    <script>
        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>

</body>

</html>
