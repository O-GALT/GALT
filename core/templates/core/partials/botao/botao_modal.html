<button class="botao botao-{{ cor }}" {% if onclick %} onclick="{{ onclick }}" {% endif %}>

    <div class="botao-imagem">
        <img src="{{ caminho_imagem }}" width="{{ largura }}" height="{{ altura }}">
    </div>

    <div class="botao-texto texto-{{ cor }}">
        <p>{{ texto }}</p>
    </div>
</button>
